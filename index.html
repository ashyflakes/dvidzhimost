                <hgroup class="navigation-logo__header-group">

            </a>
            <ul class="navigation__list">
                <li>

                </li>
                <li>
                    <a
                            href="#"
                            class="navigation-list__links catalog__link"

                    <a
                            href="#"
                            class="navigation-list__links reviews__link"

                </li>
                <li>
                    <a
                            href="#"
                            class="navigation-list__links contacts__link"
                            aria-current="page">

                    </a>

                    недвижимости

                <div class="hero__paragraph">
                    <p class="hero__parapgraphs">Аренда, продажа и подбор объектов —</p>

                <a href="#" class="hero__cta" role="button" aria-label="Начать сотрудничество">
